<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="public-page">
    <main class="public-wrapper">
        <section class="public-hero">
            <div class="public-brand">BookingFlow</div>
            <h1>Admin Login</h1>
            <p>Sign in to access the admin panel.</p>
        </section>

        <section class="panel public-panel login-panel">
            <div class="panel-header">
                <h3>Sign In</h3>
                <p>Enter admin credentials</p>
            </div>

            <section id="messageBox"></section>

            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="usernameInput">Username</label>
                    <input id="usernameInput" type="text" placeholder="Enter username" />
                </div>

                <div class="form-group full-width">
                    <label for="passwordInput">Password</label>
                    <input id="passwordInput" type="password" placeholder="Enter password" />
                </div>

                <div class="form-group full-width">
                    <button id="loginBtn" class="success-btn">Login</button>
                </div>
            </div>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
