<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Logowanie administratora</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="public-page">
    <main class="public-wrapper">
        <section class="public-hero">
            <div class="public-brand">BookingFlow</div>
            <h1>Logowanie administratora</h1>
            <p>Zaloguj się, aby przejść do panelu administracyjnego.</p>
        </section>

        <section class="panel public-panel login-panel">
            <div class="panel-header">
                <h3>Zaloguj się</h3>
                <p>Wpisz login i hasło</p>
            </div>

            <section id="messageBox"></section>

            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="usernameInput">Login</label>
                    <input id="usernameInput" type="text" placeholder="Wpisz login" />
                </div>

                <div class="form-group full-width">
                    <label for="passwordInput">Hasło</label>
                    <input id="passwordInput" type="password" placeholder="Wpisz hasło" />
                </div>

                <div class="form-group full-width">
                    <button id="loginBtn" class="success-btn">Zaloguj</button>
                </div>
            </div>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
